<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Sign up</title>
  <style>
    body { margin: 0; font-family: Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background:#f4f7fb; color:#0f172a; }
    .wrap { max-width: 480px; margin: 3rem auto; background:#fff; border:1px solid #dbe3ef; border-radius:14px; padding:1rem; }
    input { width:100%; border:1px solid #cfd9ea; border-radius:10px; padding:0.65rem; margin-top:0.3rem; margin-bottom:0.8rem; }
    button { border:0; border-radius:10px; background:#2563eb; color:#fff; padding:0.6rem 0.95rem; font-weight:600; cursor:pointer; }
    .err { color:#b91c1c; font-size:0.9rem; }
  </style>
</head>
<body>
  <main class="wrap">
    <h1>Create account</h1>
    {% if error %}<p class="err">{{ error }}</p>{% endif %}
    <form method="post" action="{{ url_for('signup') }}">
      <input type="hidden" name="csrf_token" value="{{ csrf_token }}" />
      <label>Email</label>
      <input name="email" type="email" required />
      <label>Password (min 8 chars)</label>
      <input name="password" type="password" minlength="8" required />
      <button type="submit">Create account</button>
      <p><a href="{{ url_for('login') }}">Login</a> · <a href="{{ url_for('index') }}">Back</a></p>
    </form>
  </main>
</body>
</html>
